name: Dividend Screener — Daily Run

on:
  # ── Manual trigger ──────────────────────────────────────────────
  workflow_dispatch:

  # ── Scheduled: runs every weekday at 8:00 AM Central (14:00 UTC)
  schedule:
    - cron: "0 14 * * 1-5"

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance requests pyyaml

      - name: Run screener
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: |
          python dividend_screener.py --output docs/index.html

      - name: Commit & push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "chore: update dividend screener dashboard [$(date '+%Y-%m-%d %H:%M')]"
          git push
