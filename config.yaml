# -----------------------------------------------------------------
# Dividend Panic Screener - Configuration
# -----------------------------------------------------------------

api_keys:
  newsapi: "YOUR_NEWSAPI_KEY"

screening:
  min_yield_pct: 3.0
  min_dividend_streak_years: 5
  default_drop_threshold_pct: 10

  watchlist:
    - VYM
    - SCHD
    - DVY
    - O
    - MAIN
    - JNJ
    - KO
    - PG
    - XOM
    - T
    - VZ
    - ARCC

  ticker_overrides:
    T:
      drop_threshold_pct: 15
    VZ:
      drop_threshold_pct: 15
    XOM:
      drop_threshold_pct: 12
    ARCC:
      drop_threshold_pct: 12
    MAIN:
      drop_threshold_pct: 12
    O:
      drop_threshold_pct: 8
    SCHD:
      drop_threshold_pct: 8
    VYM:
      drop_threshold_pct: 8

alerts:
  score_threshold: 65
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  from_email: ""
  to_email: ""
